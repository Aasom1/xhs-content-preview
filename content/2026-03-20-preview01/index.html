<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>青隐净舍 - 木珠手链</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif; max-width: 420px; margin: 0 auto; min-height: 100vh; }
.topbar { display: flex; align-items: center; justify-content: center; height: 44px; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; background: #fff; z-index: 10; }
.topbar .back { position: absolute; left: 12px; font-size: 20px; cursor: pointer; color: #333; }
.topbar .title { font-size: 16px; font-weight: 600; }
.carousel { position: relative; width: 100%; overflow: hidden; background: #000; }
.carousel-track { display: flex; transition: transform 0.3s ease; }
.carousel-track img { min-width: 100%; height: auto; display: block; }
.carousel-counter { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.4); color: #fff; font-size: 12px; padding: 2px 8px; border-radius: 10px; }
.actions { display: flex; align-items: center; padding: 8px 16px; gap: 16px; }
.action-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; color: #333; font-size: 10px; cursor: pointer; }
.action-btn .icon { font-size: 22px; }
.action-spacer { flex: 1; }
.author-row { display: flex; align-items: center; padding: 10px 16px; gap: 10px; }
.author-avatar { width: 32px; height: 32px; border-radius: 50%; background: #ddd; flex-shrink: 0; }
.author-info { flex: 1; }
.author-name { font-size: 14px; font-weight: 500; }
.author-desc { font-size: 12px; color: #999; margin-top: 2px; }
.follow-btn { padding: 4px 16px; border: 1px solid #ff2442; color: #ff2442; border-radius: 20px; font-size: 13px; background: #fff; cursor: pointer; }
.note-content { padding: 0 16px 16px; }
.note-title { font-size: 16px; font-weight: 600; line-height: 1.5; margin-bottom: 10px; color: #333; }
.note-text { font-size: 14px; line-height: 1.7; color: #333; }
.note-text p { margin-bottom: 8px; }
.tags { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 16px 16px; }
.tag { color: #3379e6; font-size: 13px; }
.publish-time { padding: 0 16px 16px; font-size: 12px; color: #999; }
.bottom-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; display: flex; align-items: center; gap: 10px; padding: 8px 16px; background: #fff; border-top: 1px solid #f0f0f0; }
.bottom-bar input { flex: 1; padding: 8px 12px; border-radius: 20px; border: 1px solid #eee; font-size: 14px; background: #f5f5f5; outline: none; }
.bottom-bar .send-btn { color: #ff2442; font-size: 14px; font-weight: 500; cursor: pointer; }
</style>
</head>
<body>
<div class="topbar">
  <span class="back">‹</span>
  <span class="title">笔记</span>
</div>
<div class="carousel" id="carousel">
  <div class="carousel-track" id="track">
    <img src="./images/01.jpg" alt="">
    <img src="./images/02.jpg" alt="">
  </div>
  <div class="carousel-counter" id="counter">1/2</div>
</div>
<div class="actions">
  <div class="action-btn"><span class="icon">♥</span><span class="count">赞</span></div>
  <div class="action-btn"><span class="icon">⭐</span><span class="count">收藏</span></div>
  <div class="action-btn"><span class="icon">💬</span><span class="count">评论</span></div>
  <div class="action-spacer"></div>
  <div class="action-btn"><span class="icon">↗</span><span class="count">分享</span></div>
</div>
<div class="author-row">
  <div class="author-avatar"></div>
  <div class="author-info">
    <div class="author-name">青隐专注原创手工</div>
    <div class="author-desc">灵隐三十年 · 原创手工饰品</div>
  </div>
  <button class="follow-btn">+ 关注</button>
</div>
<div class="note-content">
  <div class="note-title">在灵隐穿了三十年珠子，这串是我留给自己的</div>
  <div class="note-text">
    <p>深红色的木珠上手那一刻，你会觉得手腕上多了一点什么。</p>
    <p>不是装饰，是一种很安静的踏实感。</p>
    <p>配了一颗绿翡翠和一颗小橘石，颜色克制，不抢戏。</p>
    <p>我见过太多花哨的款式，最后戴得最久的，反而是这种不声不响的。</p>
    <p>木珠会随着你戴的时间慢慢变深，越来越润。</p>
    <p>像是在替你记住什么。</p>
    <p>来灵隐三十年，这串是我自己天天戴的。</p>
    <p>偶尔有客人指着我的手腕说：就这个。</p>
    <p>我就知道，她懂了。</p>
  </div>
</div>
<div class="tags">
  <span class="tag">#灵隐</span>
  <span class="tag">#手工手串</span>
  <span class="tag">#原木手链</span>
  <span class="tag">#我的日常配饰</span>
  <span class="tag">#小众手作</span>
</div>
<div class="publish-time">03-20 发布</div>
<div style="height: 60px;"></div>
<div class="bottom-bar">
  <input type="text" placeholder="说点什么…">
  <span class="send-btn">发送</span>
</div>
<script>
let current = 0;
const track = document.getElementById('track');
const counter = document.getElementById('counter');
const total = track.children.length;
document.getElementById('carousel').addEventListener('click', e => {
  const rect = e.currentTarget.getBoundingClientRect();
  if (e.clientX - rect.left > rect.width / 2) goTo(current + 1); else goTo(current - 1);
});
function goTo(i) {
  current = Math.max(0, Math.min(i, total - 1));
  track.style.transform = `translateX(-${current * 100}%)`;
  counter.textContent = `${current + 1}/${total}`;
}
</script>
</body>
</html>
