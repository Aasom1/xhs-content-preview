<div class="note-content"><div class="note-title">水晶这东西，你得拿在手里才懂</div><div class="note-text"><p>隔着屏幕看水晶，和拿在手里看，完全是两回事。</p><p>好的水晶对着光，里面有天然的絮状纹理，像云，像雾。</p><p>每一颗珠子都不一样——色差、冰裂、包裹体，都是天然长出来的记号。</p><p>我们挑原石的时候，会选那些"第一眼就觉得舒服"的。</p><p>没有什么科学依据，就是手感对了。</p><p>有时候缘分这东西，不需要解释。</p></div></div>
