<div class="note-content"><div class="note-title">手绳这件事，编的不只是绳子</div><div class="note-text"><p>一条手绳，从选线到编结，至少要过七道手。</p><p>颜色搭配靠经验，松紧程度靠手感，每一条都有自己的脾气。</p><p>我们用的编绳线都是日晒不变色的那种，戴一年还是刚买时候的样子。</p><p>配的吊坠也是一颗颗挑的，不求贵，但求和绳子搭得上。</p><p>有客人说我们手绳戴久了会变成"自己的一部分"。</p><p>我觉得那是因为编的时候，确实用了心。</p></div></div>
