<div class="note-content"><div class="note-title">太岁包这件事，我们做了很多年</div><div class="note-text"><p>每年年底，来店里请太岁包的人就会多起来。</p><p>我们每一年的太岁包都是重新配的，根据当年的生肖流年调整。</p><p>布袋是手工刺绣的，挂件按生肖不同搭配不同图案。</p><p>里面配的绳结、护身符都有讲究，不是随便放进去的。</p><p>这件事我们做了很多年，客人们也认。</p><p>每年都会有人专门来复购，给自己，也给家里人。</p></div></div>
